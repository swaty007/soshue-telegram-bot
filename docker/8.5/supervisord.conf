[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:php]
command=%(ENV_SUPERVISOR_PHP_COMMAND)s
user=%(ENV_SUPERVISOR_PHP_USER)s
environment=LARAVEL_SAIL="1"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:telegram]
process_name=%(program_name)s
command=/usr/bin/php /var/www/html/artisan nutgram:run # :listen
autostart=true
autorestart=true
numprocs=1
# user=www-data
user=%(ENV_SUPERVISOR_PHP_USER)s
redirect_stderr=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
#stderr_logfile=/tmp/horizon.log
stopwaitsecs=3600
startretries=999999
logfile_maxbytes=0
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0

[program:horizon]
process_name=%(program_name)s
command=/usr/bin/php /var/www/html/artisan horizon
autostart=true
autorestart=true
numprocs=1
# user=www-data
user=%(ENV_SUPERVISOR_PHP_USER)s
redirect_stderr=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
#stderr_logfile=/tmp/horizon.log
stopwaitsecs=3600
startretries=999999
logfile_maxbytes=0
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0

[program:scheduler]
process_name=%(program_name)s_%(process_num)02d
#command=/bin/sh -c "while [ true ]; do (/usr/bin/php /var/www/html/artisan schedule:run --verbose --no-interaction &); sleep 60; done"
#command=/usr/bin/php /var/www/html/artisan schedule:run --verbose --no-interaction
command=/usr/bin/php /var/www/html/artisan schedule:work --verbose --no-interaction
autostart=true
autorestart=true
numprocs=1
# user=www-data
user=%(ENV_SUPERVISOR_PHP_USER)s
redirect_stderr=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
#stderr_logfile=/tmp/scheduler.log
logfile_maxbytes=0
startretries=999999
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
